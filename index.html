<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasah Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* উপরের হেডার - লোগো এক লাইনে এবং ছোট */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: #0a0a0a;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo-white { color: #ffffff; }
        .logo-gold { color: #d4af37; }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
        }

        /* মাঝখানের কন্টেন্ট */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
            padding-bottom: 5vh; 
        }

        .sub-title {
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #d4af37;
            opacity: 0.8;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; 
            font-weight: 800;
            margin: 0;
        }

        .title-white { color: #ffffff; }
        .title-gold { color: #d4af37; }

        .author {
            margin-top: 15px;
            color: #555;
            font-size: 0.9rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        /* ফুটার */
        footer {
            width: 100%;
            padding-bottom: 30px;
            text-align: center;
        }

        .madrasah-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
            margin: 0;
        }

        @media (max-width: 600px) {
            .main-title { font-size: 2.2rem; }
            .nav-links { gap: 10px; }
            .logo { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <span class="logo-white">MADRASAH</span> <span class="logo-gold">NOTE</span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="torjoma.html">তরজমা</a>
            <a href="#">আরবি</a>
            <a href="#">বাংলা</a>
            <a href="#">ইংরেজি</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">
            <span class="title-white">Madrasah</span> <span class="title-gold">Note</span>
        </h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
    </main>

    <footer>
        <p class="madrasah-name">MUHAMMADIA JAMIA SHAREEF MADRASAH</p>
    </footer>

</body>
</html>
