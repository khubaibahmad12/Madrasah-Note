<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasah Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* উপরের নেভিগেশন বার - লোগো বামে, মেনু ডানে */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4%;
            background-color: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem; /* ছোট সাইজ */
            font-weight: 700;
            letter-spacing: 1px;
            color: #d4af37;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem; /* ছোট সাইজ */
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #d4af37;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .sub-title {
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #d4af37;
            opacity: 0.8;
        }

        /* মাঝখানের টাইটেল - এক লাইনে এবং ছোট */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem; /* সাইজ ছোট করা হয়েছে */
            font-weight: 800;
            margin: 0;
            white-space: nowrap; /* এক লাইনে রাখার জন্য */
        }

        .title-white { color: #ffffff; }
        .title-gold { color: #d4af37; margin-left: 8px; }

        .author {
            margin-top: 20px;
            color: #555;
            font-size: 0.9rem;
            font-family: 'Playfair Display', serif;
        }

        .footer-text {
            margin-top: auto;
            padding: 30px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #d4af37;
            opacity: 0.5;
        }

        /* মোবাইল স্ক্রিনের জন্য বিশেষ সমন্বয় */
        @media (max-width: 600px) {
            .main-title { font-size: 2rem; }
            .nav-links { gap: 8px; }
            .nav-links a { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MADRASAH NOTE</a>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">তরজমা</a>
            <a href="#">আরবি</a>
            <a href="#">বাংলা</a>
            <a href="#">ইংরেজি</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">
            <span class="title-white">Madrasah</span><span class="title-gold">Note</span>
        </h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
        
        <div class="footer-text">CONTRIBUTED BY</div>
    </main>

</body>
</html>
