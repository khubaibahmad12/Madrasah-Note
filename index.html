<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasah Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,700;1,800&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 5%;
            background-color: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            gap: 20px;
        }

        .logo {
            font-family: 'Cinzel', serif; /* স্ক্রিনশটের মতো গোল্ডেন লোগো ফন্ট */
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #d4af37;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .nav-links a {
            color: #444;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #d4af37;
            background: #1a150a;
            padding: 5px 15px;
            border-radius: 4px;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .sub-title {
            font-size: 1.1rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: #d4af37;
            font-weight: 400;
            opacity: 0.8;
        }

        /* হুবহু ইমেজের মতো টাইটেল ডিজাইন */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
        }

        .title-white {
            color: #ffffff; /* Madrasah অংশটি সাদা */
            font-style: normal;
        }

        .title-gold {
            color: #d4af37; /* Note অংশটি সোনালী */
            font-style: normal;
            margin-left: 5px;
        }

        .author {
            margin-top: 40px;
            color: #555;
            font-size: 1rem;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
        }

        .contributed {
            margin-top: auto;
            padding: 40px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #d4af37;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @media (min-width: 768px) {
            nav { flex-direction: row; justify-content: space-between; }
            .main-title { font-size: 6.5rem; }
            .logo { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MADRASAH NOTE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">তরজমা</a>
            <a href="#">আরবি</a>
            <a href="#">বাংলা</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">
            <span class="title-white">Madrasah</span><br>
            <span class="title-gold">Note</span>
        </h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
        
        <div class="contributed">CONTRIBUTED BY</div>
    </main>

</body>
</html>
