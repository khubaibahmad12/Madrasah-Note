<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADRASAH NOTE - LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* কালার ভেরিয়েবল */
        :root {
            --bg-color: #0a0a0a; 
            --gold-color: #d4af37;
            --white-text: #ffffff;
            --author-text: #555;
            --menu-bg: rgba(15, 15, 15, 0.95);
            --input-bg: #1a1a1a;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --gold-color: #a68926;
            --white-text: #1a1a1a;
            --author-text: #777;
            --menu-bg: rgba(245, 245, 245, 0.98);
            --input-bg: #f0f0f0;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--gold-color);
            font-family: 'Hind Siliguri', sans-serif;
            transition: 0.4s;
            overflow-x: hidden;
        }

        /* Nav & Layout */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%;
        }
        .logo { font-family: 'Cinzel', serif; font-size: 1.2rem; font-weight: 700; text-decoration: none; }
        .logo-white { color: var(--white-text); }
        
        /* Login Form Section */
        #login-container {
            display: flex; justify-content: center; align-items: center;
            height: 80vh;
        }

        .login-box {
            background: var(--menu-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }

        .login-box h2 { font-family: 'Playfair Display', serif; color: var(--white-text); }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: var(--input-bg);
            border: 1px solid #333;
            color: var(--white-text);
            border-radius: 5px;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--gold-color);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-box button:hover { opacity: 0.8; }

        /* Dashboard Section (Hidden by default) */
        #dashboard {
            display: none;
            padding: 40px 5%;
            text-align: center;
        }

        .welcome-msg { font-size: 2rem; color: var(--white-text); margin-bottom: 20px; }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--gold-color);
            color: var(--gold-color);
            padding: 8px 15px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">
            <span class="logo-white">MADRASAH</span> <span class="logo-gold">NOTE</span>
        </a>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()" style="cursor:pointer">☀️</div>
            <button id="logoutBtn" class="logout-btn hidden" onclick="logout()">লগ-আউট</button>
        </div>
    </nav>

    <div id="login-container">
        <div class="login-box">
            <h2>লগইন করুন</h2>
            <input type="text" id="username" placeholder="ইউজারনেম (admin)">
            <input type="password" id="password" placeholder="পাসওয়ার্ড (1234)">
            <button onclick="login()">প্রবেশ করুন</button>
            <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px; display: none;">ভুল তথ্য দিয়েছেন!</p>
        </div>
    </div>

    <main id="dashboard">
        <p class="sub-title">মাদ্রাসা নোট ড্যাশবোর্ড</p>
