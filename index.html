<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasah Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif; /* বাংলা ফন্ট এখানে সেট করা হয়েছে */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            display: flex;
            flex-direction: column; /* মোবাইলে মেনু সাজানোর জন্য */
            align-items: center;
            padding: 20px 5%;
            background-color: #0f0f0f;
            gap: 15px;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap; /* লেখা বেশি হলে নিচের লাইনে চলে আসবে */
            justify-content: center;
            gap: 10px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 5px 8px;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #d4af37;
            background: #1a1a1a;
            border-radius: 5px;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .sub-title {
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .main-title span {
            color: #fff; 
        }

        .author {
            margin-top: 20px;
            color: #666;
            font-size: 1rem;
            font-weight: 400;
        }

        /* ডেক্সটপের জন্য মেনু ঠিক করা */
        @media (min-width: 768px) {
            nav {
                flex-direction: row;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MADRASAH NOTE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">কুরআন শরীফ তরজমা</a>
            <a href="#">হাদীছ শরীফ</a>
            <a href="#">আরবী</a>
            <a href="#">বাংলা</a>
            <a href="#">ইংরেজি</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">Madrasah <span>Note</span></h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
    </main>

</body>
</html>
