<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrasah Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 5%;
            background-color: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            gap: 15px;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #d4af37;
            background: #1a150a;
            padding: 4px 12px;
            border-radius: 4px;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .sub-title {
            font-size: 1.1rem;
            letter-spacing: 4px;
            margin-bottom: 15px;
            color: #d4af37;
            opacity: 0.9;
        }

        /* টাইটেল ডিজাইন - ঠিক আপনার স্ক্রিনশটের মতো */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
        }

        .title-white {
            color: #ffffff; /* Madrasah লেখাটি সাদা হবে */
        }

        .title-gold {
            color: #d4af37; /* Note লেখাটি সোনালী হবে */
            display: block; /* মোবাইলে Note লেখাটি নিচে দেখাবে */
            margin-top: 5px;
        }

        .author {
            margin-top: 30px;
            color: #555;
            font-size: 0.95rem;
            letter-spacing: 1px;
            font-family: 'Playfair Display', serif;
        }

        .footer-text {
            margin-top: auto;
            padding: 30px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #d4af37;
            text-transform: uppercase;
            opacity: 0.6;
        }

        @media (min-width: 768px) {
            nav { flex-direction: row; justify-content: space-between; }
            .main-title { font-size: 6rem; }
            .title-gold { display: inline; margin-left: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MADRASAH NOTE</div>
        <div class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#">তরজমা</a>
            <a href="#">হাদীছ শরীফ</a>
            <a href="#">আরবী ১ম</a>
            <a href="#">আরবী ২য়</a>
            <a href="#">আক্বাইদ ও ফিক্বহ</a>
            <a href="#">বাংলা</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">
            <span class="title-white">Madrasah</span>
            <span class="title-gold">Note</span>
        </h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
        
        <div class="footer-text">CONTRIBUTED BY</div>
    </main>

</body>
</html>
