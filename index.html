<!DOCTYPE html>
<html lang="bn">
<head>

        body {

            background-color: #0a0a0a;

            display: flex;

            overflow: hidden;
        }

        /* হেডার: লোগো বামে এবং মেনু ডানে */
        nav {
            display: flex;

            align-items: center;
            padding: 20px 5%;
            background-color: #0a0a0a;
        }

        .logo {
            font-family: 'Cinzel', serif;

            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #d4af37;
        }

            padding-bottom: 5vh; /* সামান্য উপরে তোলার জন্য */
        }

            margin-bottom: 10px;
            color: #d4af37;
            opacity: 0.8;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem; 
            font-weight: 800;
            margin: 0;
            white-space: nowrap;
        }

        .title-white { color: #ffffff; }
        .title-gold { color: #d4af37; margin-left: 10px; }

        .author {
            margin-top: 15px;
            color: #555;
            font-size: 0.9rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }
