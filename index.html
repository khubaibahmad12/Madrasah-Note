<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মূল পৃষ্ঠা</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Cinzel:wght@700&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; 
            color: #d4af37; 
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        /* হেডার স্টাইল */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: #0a0a0a;
            position: relative;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
            white-space: nowrap;
        }

        .logo-white { color: #ffffff; }
        .logo-gold { color: #d4af37; }

        /* মেনু আইকন স্টাইল (তিনটি ডট বা লাইন) */
        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 1001;
        }

        .menu-icon span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: #d4af37;
            transition: 0.3s;
        }

        /* ড্রপডাউন মেনু স্টাইল */
        .nav-links {
            position: absolute;
            top: 70px;
            right: 5%;
            background-color: rgba(15, 15, 15, 0.95);
            border: 1px solid #d4af37;
            display: none; /* শুরুতে লুকানো থাকবে */
            flex-direction: column;
            padding: 20px;
            border-radius: 8px;
            z-index: 1000;
            min-width: 150px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-links.active {
            display: flex; /* ক্লিক করলে দেখাবে */
            animation: fadeIn 0.3s ease-in-out;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            padding: 10px 0;
            border-bottom: 1px solid #222;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #d4af37;
            padding-left: 5px;
        }

        .nav-links a:last-child {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* কন্টেন্ট */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            text-align: center;
        }

        .sub-title {
            font-size: 0.9rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            color: #d4af37;
            opacity: 0.8;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem; 
            font-weight: 800;
            margin: 0;
        }

        .title-white { color: #ffffff; }
        .title-gold { color: #d4af37; }

        .author {
            margin-top: 15px;
            color: #555;
            font-size: 0.9rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }

        footer {
            width: 100%;
            padding-bottom: 30px;
            text-align: center;
        }

        .madrasah-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #d4af37;
            text-transform: uppercase;
            margin: 0;
        }

        @media (max-width: 600px) {
            .main-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <span class="logo-white">MADRASAH</span> <span class="logo-gold">NOTE</span>
        </a>

        <div class="menu-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">মূল পৃষ্ঠা</a>
            <a href="tarjoma.html">তরজমা</a>
            <a href="#">হাদীছ শরীফ</a>
            <a href="#">আরবি</a>
            <a href="#">বাংলা</a>
            <a href="#">ইংরেজি</a>
        </div>
    </nav>

    <main>
        <p class="sub-title">মাদ্রাসা নোট সংকলন</p>
        <h1 class="main-title">
            <span class="title-white">Madrasah</span> <span class="title-gold">Note</span>
        </h1>
        <p class="author">By Enayet Karim & Khubaib Ahmad</p>
    </main>

    <footer>
        <p class="madrasah-name">MUHAMMADIA JAMIA SHAREEF MADRASAH</p>
    </footer>

    <script>
        function toggleMenu() {
            const navLinks = document.getElementById("navLinks");
            navLinks.classList.toggle("active");
        }

        // মেনুর বাইরে ক্লিক করলে মেনু বন্ধ হয়ে যাবে
        window.onclick = function(event) {
            if (!event.target.matches('.menu-icon') && !event.target.matches('.menu-icon span')) {
                var dropdowns = document.getElementsByClassName("nav-links");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('active')) {
                        openDropdown.classList.remove('active');
                    }
                }
            }
        }
    </script>

</body>
        </html>
